<!DOCTYPE html>
<html class="scroll-smooth" lang="pt-BR">
<head>
    <!-- add google analytics -->
    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script async src='https://www.googletagmanager.com/gtag/js?id=G-B1LY3W0F6L'></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-B1LY3W0F6L');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="@tarlistortelli">
    <title>Tarlis Tortelli</title>
    <link rel="icon" type="image/jpeg" href="img/logo.jpg">
    <link rel="shortcut icon" type="image/png" href="img/logo.jpg">
    <link rel="apple-touch-icon" href="img/logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header id="site-header">
        <nav id="top-nav">
            <div id="site-title" class="nav-brand"></div>
            <div id="nav-menu" class="nav-links"></div>
            <button id="menu-toggle" aria-label="Menu">
                <span class="material-symbols-outlined">menu</span>
            </button>
        </nav>
    </header>

    <div id="mobile-overlay" class="mobile-overlay"></div>

    <main>
        <div id="page-content" class="page-content"></div>
    </main>

    <footer id="site-footer">
        <div class="footer-inner">
            <div class="footer-brand">
                <div id="footer-title" class="footer-name"></div>
                <p id="footer-copy" class="footer-copy"></p>
            </div>
            <div id="footer-links" class="footer-links"></div>
        </div>
    </footer>

    <!-- Password modal for protected pages -->
    <div id="auth-modal" class="auth-modal" hidden>
        <div class="auth-modal-box">
            <span class="material-symbols-outlined auth-modal-icon">lock</span>
            <h2 class="auth-modal-title">Protected Page</h2>
            <p class="auth-modal-desc">Enter the password to access this content.</p>
            <div class="auth-input-wrap">
                <input id="auth-password" type="password" class="auth-input" placeholder="Password" autocomplete="current-password">
                <button id="auth-submit" class="auth-btn">
                    <span class="material-symbols-outlined">arrow_forward</span>
                </button>
            </div>
            <p id="auth-error" class="auth-error" hidden>Incorrect password. Try again.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
